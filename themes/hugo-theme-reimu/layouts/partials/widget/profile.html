<div class="widget-profile">
  <div class="profile-avatar">
    {{- $avatar := .Site.Params.avatar | default .Site.Params.authorAvatar | default "/images/avatar.jpg" -}}
    <img src="{{ $avatar | relURL }}" alt="{{ .Site.Params.author }}" class="avatar-img">
  </div>
  <div class="profile-name">
    <h3>{{ .Site.Params.author | default "作者" }}</h3>
  </div>
  <div class="profile-bio">
    <p>{{ .Site.Params.description | default "" }}</p>
  </div>
  <div class="profile-social">
    {{- range .Site.Params.socialIcons -}}
      <a href="{{ .url }}" target="_blank" rel="noopener">
        <i class="icon-{{ .name }}"></i>
      </a>
    {{- end -}}
  </div>
</div>
