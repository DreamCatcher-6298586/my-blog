baseURL = 'https://my-blog-green-two-28.vercel.app/'
languageCode = "zh-cn"
hasCJKLanguage = true
title = "落弦尘的博客"
theme = "hugo-theme-reimu"

[params]
  author = "落弦尘"
  avatar = "/images/avatar.jpg"
  authorAvatar = "https://my-blog-green-two-28.vercel.app/images/avatar.jpg"
  description = "如果能久别重逢，我希望你别来无恙。"
  mainSections = ["posts"]

  menu = [
    { name = "home", url = "" },
    { name = "archives", url = "posts" },
    { name = "friend", url = "friend" },
    { name = "about", url = "about" }
  ]

  socialIcons = []

  [params.social]
    github = "https://github.com/DreamCatcher-6298586"

  # 评论系统 (giscus)
  [params.comments]
    enabled = true
    type = "giscus"

  [params.giscus]
    enable = true
    repo = "DreamCatcher-6298586/my-blog"
    repoId = "R_kgDOTdtD5A"
    category = "Announcements"
    categoryId = "DIC_kwDOTdtD5M4DBpRC"
    mapping = "pathname"
    inputPosition = "bottom"

  # 首页分类卡片
  [params.home_categories]
    enable = false

  # Live2D 看板娘
  [params.live2d]
    enable = true
    position = "left"

  # 音乐播放器 (QQ音乐)
  [params.player]
    [params.player.aplayer]
      enable = true
      [params.player.aplayer.options]
        fixed = true
        preload = "auto"
    [params.player.meting]
      enable = true
      [params.player.meting.options]
        id = "003WHs6a1qmOeG"
        server = "tencent"
        type = "song"

  # PJAX 无刷新加载
  [params.pjax]
    enable = true

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "友链"
    url = "/friend/"
    weight = 3
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 4

[services]
  [services.rss]
    limit = 10
